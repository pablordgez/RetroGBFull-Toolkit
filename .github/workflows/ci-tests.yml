name: Unit Tests & Coverage

# Trigger the workflow on push or pull request to main branches
on:
  push:
    branches: [ main, master ]
    paths:
      - 'gui/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'gui/**'

# Cancel previous runs if a new commit is pushed to save time/resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./gui

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./gui/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run coverage

      - name: Upload Coverage Artifact
        if: always() && !env.ACT # act does not provide the artifact runtime token used on GitHub
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: gui/coverage/
          retention-days: 14
